name: Tauri Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows desktop app
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri Windows app
        run: npx tauri build

      - name: Smoke test Windows setup executable
        shell: pwsh
        run: |
          $setup = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Filter "*setup.exe" | Select-Object -First 1
          if (-not $setup) {
            throw "No NSIS setup executable was generated."
          }

          $install = Start-Process -FilePath $setup.FullName -ArgumentList "/S" -PassThru
          if (-not $install.WaitForExit(120000)) {
            Stop-Process -Id $install.Id -Force -ErrorAction SilentlyContinue
            throw "NSIS setup timed out during silent install."
          }
          if ($install.ExitCode -ne 0) {
            throw "NSIS setup failed with exit code $($install.ExitCode)."
          }

          $candidatePaths = @(
            (Join-Path $env:LOCALAPPDATA "Programs\ERP System\ERP System.exe"),
            (Join-Path $env:LOCALAPPDATA "Programs\ERP System\app.exe"),
            (Join-Path $env:LOCALAPPDATA "ERP System\ERP System.exe"),
            (Join-Path $env:LOCALAPPDATA "ERP System\app.exe"),
            (Join-Path $env:ProgramFiles "ERP System\ERP System.exe"),
            (Join-Path $env:ProgramFiles "ERP System\app.exe"),
            (Join-Path ${env:ProgramFiles(x86)} "ERP System\ERP System.exe"),
            (Join-Path ${env:ProgramFiles(x86)} "ERP System\app.exe")
          )

          $exe = $candidatePaths |
            Where-Object { $_ -and (Test-Path $_) } |
            Select-Object -First 1

          if (-not $exe) {
            $candidatePaths | ForEach-Object { Write-Host "Checked: $_" }
            throw "Installed ERP System executable was not found."
          }

          $process = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 10

          $running = Get-Process -Id $process.Id -ErrorAction SilentlyContinue
          if (-not $running) {
            throw "ERP System.exe exited immediately after launch."
          }

          Stop-Process -Id $process.Id -Force

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: erp-windows-installer
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.zip
          if-no-files-found: error
          compression-level: 0
