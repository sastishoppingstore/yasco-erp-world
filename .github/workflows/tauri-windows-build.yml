name: Tauri Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows desktop app
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri Windows app
        run: npx tauri build

      - name: Smoke test Windows installer
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) {
            throw "No MSI installer was generated."
          }

          $log = Join-Path $env:RUNNER_TEMP "erp-msi-install.log"
          $install = Start-Process -FilePath "msiexec.exe" -ArgumentList @("/i", $msi.FullName, "/qn", "/norestart", "/L*v", $log) -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            Get-Content $log -Tail 200
            throw "MSI install failed with exit code $($install.ExitCode)."
          }

          $uninstallKeys = @(
            "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*",
            "HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\*",
            "HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*"
          )

          $installInfo = $uninstallKeys |
            ForEach-Object { Get-ItemProperty $_ -ErrorAction SilentlyContinue } |
            Where-Object { $_.DisplayName -eq "ERP System" } |
            Select-Object -First 1

          $candidatePaths = @()
          if ($installInfo -and $installInfo.InstallLocation) {
            $candidatePaths += Join-Path $installInfo.InstallLocation "ERP System.exe"
          }

          $candidatePaths += @(
            (Join-Path $env:ProgramFiles "ERP System\ERP System.exe"),
            (Join-Path ${env:ProgramFiles(x86)} "ERP System\ERP System.exe"),
            (Join-Path $env:LOCALAPPDATA "Programs\ERP System\ERP System.exe"),
            (Join-Path $env:LOCALAPPDATA "ERP System\ERP System.exe")
          )

          $exe = $candidatePaths |
            Where-Object { $_ -and (Test-Path $_) } |
            Select-Object -First 1

          if (-not $exe) {
            throw "Installed ERP System.exe was not found."
          }

          $process = Start-Process -FilePath $exe -PassThru
          Start-Sleep -Seconds 10

          $running = Get-Process -Id $process.Id -ErrorAction SilentlyContinue
          if (-not $running) {
            throw "ERP System.exe exited immediately after launch."
          }

          Stop-Process -Id $process.Id -Force

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: erp-windows-installer
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.zip
          if-no-files-found: error
          compression-level: 0
