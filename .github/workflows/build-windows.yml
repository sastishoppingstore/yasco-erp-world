name: Build Windows Desktop App

on:
  push:
    branches: [main, new3]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "22"

jobs:
  build:
    name: Build Windows desktop app
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm install --legacy-peer-deps

      - name: Prepare Node.js sidecar
        shell: pwsh
        run: |
          $nodeVersion = "v22.22.3"
          $zipPath = Join-Path $env:RUNNER_TEMP "node-win-x64.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "node-win-x64"
          Invoke-WebRequest "https://nodejs.org/dist/$nodeVersion/node-$nodeVersion-win-x64.zip" -OutFile $zipPath
          Expand-Archive $zipPath -DestinationPath $extractDir
          New-Item -ItemType Directory -Force "src-tauri/binaries"
          Copy-Item (Join-Path $extractDir "node-$nodeVersion-win-x64\node.exe") "src-tauri/binaries/node-x86_64-pc-windows-msvc.exe"

      - run: npx tauri build --bundles nsis,msi

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yasco-erp-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          compression-level: 0
